<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INVNTRY // Inventory Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-bracket">[</span>
        <span class="logo-text">INVNTRY</span>
        <span class="logo-bracket">]</span>
        <span class="logo-sub">// Stock Management System v1.0</span>
      </div>
      <div class="header-status">
        <span class="status-dot"></span>
        <span class="status-text">SYSTEM ONLINE</span>
      </div>
    </div>
  </header>

  <!-- STATS BAR -->
  <section class="stats-bar">
    <div class="stat-card">
      <div class="stat-label">PRODUCTS</div>
      <div class="stat-value" id="stat-products">--</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">TOTAL ITEMS</div>
      <div class="stat-value" id="stat-items">--</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">TOTAL VALUE</div>
      <div class="stat-value" id="stat-value">--</div>
    </div>
    <div class="stat-card stat-warn">
      <div class="stat-label">LOW STOCK</div>
      <div class="stat-value" id="stat-low">--</div>
    </div>
    <div class="stat-card stat-danger">
      <div class="stat-label">OUT OF STOCK</div>
      <div class="stat-value" id="stat-out">--</div>
    </div>
  </section>

  <!-- TOOLBAR -->
  <section class="toolbar">
    <div class="toolbar-left">
      <div class="search-wrap">
        <span class="search-icon">&#x2315;</span>
        <input type="text" id="search-input" class="search-input" placeholder="Search products, SKU..." autocomplete="off" />
        <button class="clear-btn" id="clear-search" title="Clear search">&times;</button>
      </div>
      <div class="filter-wrap">
        <label class="filter-label">CAT://</label>
        <select id="category-filter" class="filter-select">
          <option value="all">ALL</option>
        </select>
      </div>
    </div>
    <div class="toolbar-right">
      <button class="btn btn-primary" id="add-btn">
        <span class="btn-plus">+</span> ADD PRODUCT
      </button>
    </div>
  </section>

  <!-- PRODUCT GRID -->
  <main class="main-content">
    <div class="product-grid" id="product-grid">
      <!-- Products rendered here -->
    </div>
    <div class="empty-state" id="empty-state" style="display:none;">
      <div class="empty-icon">&#x25A1;</div>
      <div class="empty-title">NO PRODUCTS FOUND</div>
      <div class="empty-sub">Try adjusting your search or filters</div>
    </div>
  </main>

  <!-- ADD / EDIT MODAL -->
  <div class="modal-overlay" id="modal-overlay" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">ADD PRODUCT</h2>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <form id="product-form" class="modal-form" novalidate>
        <input type="hidden" id="form-id" />
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">PRODUCT NAME *</label>
            <input type="text" id="form-name" class="form-input" placeholder="e.g. Mechanical Keyboard" required />
          </div>
          <div class="form-group">
            <label class="form-label">SKU *</label>
            <input type="text" id="form-sku" class="form-input" placeholder="e.g. ELEC-007" required />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">CATEGORY *</label>
            <input type="text" id="form-category" class="form-input" placeholder="e.g. Electronics" list="category-list" required />
            <datalist id="category-list"></datalist>
          </div>
          <div class="form-group">
            <label class="form-label">PRICE ($) *</label>
            <input type="number" id="form-price" class="form-input" placeholder="0.00" min="0" step="0.01" required />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">QUANTITY *</label>
            <input type="number" id="form-quantity" class="form-input" placeholder="0" min="0" step="1" required />
          </div>
          <div class="form-group">
            <label class="form-label">DESCRIPTION</label>
            <input type="text" id="form-description" class="form-input" placeholder="Short description..." />
          </div>
        </div>
        <div class="form-error" id="form-error"></div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="modal-cancel">CANCEL</button>
          <button type="submit" class="btn btn-primary" id="form-submit">SAVE PRODUCT</button>
        </div>
      </form>
    </div>
  </div>

  <!-- DELETE CONFIRM MODAL -->
  <div class="modal-overlay" id="delete-overlay" style="display:none;">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2 class="modal-title">CONFIRM DELETE</h2>
      </div>
      <div class="delete-body">
        <div class="delete-warning-icon">&#x26A0;</div>
        <p class="delete-msg">Remove <strong id="delete-product-name">this product</strong> from inventory?<br/>
        <span class="delete-sub">This action cannot be undone.</span></p>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="delete-cancel">CANCEL</button>
        <button class="btn btn-danger" id="delete-confirm">DELETE</button>
      </div>
    </div>
  </div>

  <!-- TOAST NOTIFICATIONS -->
  <div class="toast-container" id="toast-container"></div>

  <script src="app.js"></script>
</body>
</html>
